name: Agent Check

on:
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  agent-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv pip install --system -e ".[dev,docs]"

      - name: Run agent verification
        shell: pwsh
        run: ./scripts/agent_verify.ps1
